version: "3.8"

services:
  rustfs-server:
    build:
      context: ./apps/object-storage
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      RUSTFS_ADDRESS: ":${OBJECT_STORAGE_PORT:-9100}"
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-true}
      RUSTFS_ACCESS_KEY: ${OBJECT_STORAGE_KEY}
      RUSTFS_SECRET_KEY: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_PORT: ${OBJECT_STORAGE_PORT:-9100}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_KEY: ${OBJECT_STORAGE_KEY}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      RUSTFS_GLOBAL_REGION: ${RUSTFS_GLOBAL_REGION:-${OBJECT_STORAGE_REGION}}
    command:
      - "--address"
      - ":${OBJECT_STORAGE_PORT:-9100}"
      - "--console-enable"
      - "--access-key"
      - "${OBJECT_STORAGE_KEY}"
      - "--secret-key"
      - "${OBJECT_STORAGE_SECRET}"
      - "--region"
      - "${OBJECT_STORAGE_REGION:-us-east-1}"
      - "/data"
    ports:
      - "${OBJECT_STORAGE_PORT:-9100}:${OBJECT_STORAGE_PORT:-9100}"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9001/rustfs/console/index.html",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  rustfs_data:
