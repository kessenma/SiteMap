# PowerSync Service Configuration
# This file is a reference/template only.
# The actual config is generated at runtime by entrypoint.sh from DATABASE_URL env var.

replication:
  connections:
    - type: postgresql
      uri: ${DATABASE_URL}
      sslmode: disable
      slot_name: powersync_sitemap_slot
      publication_name: powersync_sitemap_pub

storage:
  type: postgresql
  uri: ${DATABASE_URL}
  sslmode: disable

port: 6061

sync_rules:
  path: /config/sync-config.yaml

client_auth:
  supabase: false
  jwks:
    keys:
      - kid: "sitemap-key"
        kty: oct
        k: ${JWT_SECRET_BASE64URL}
        alg: HS256

  audience: ["powersync", "powersync-dev"]
  issuer: https://sitemap.live

telemetry:
  disable_telemetry_sharing: true

diagnostics:
  disable: false

log_level: info
